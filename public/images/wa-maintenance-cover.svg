<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 418" width="800" height="418">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap');
      text { font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0d1f3c"/>
      <stop offset="55%"  style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#1c3461"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#b8922a"/>
      <stop offset="50%"  style="stop-color:#e8c97a"/>
      <stop offset="100%" style="stop-color:#c5a059"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#e8c97a"/>
      <stop offset="100%" style="stop-color:#c5a059"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#c5a059;stop-opacity:0"/>
      <stop offset="30%"  style="stop-color:#c5a059;stop-opacity:0.6"/>
      <stop offset="70%"  style="stop-color:#c5a059;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c5a059;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="logoHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#c5a059;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#c5a059;stop-opacity:0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="logoFilter" color-interpolation-filters="sRGB">
      <!-- رفع السطوع وإضافة ظل ذهبي -->
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.4" intercept="0.05"/>
        <feFuncG type="linear" slope="1.2" intercept="0.04"/>
        <feFuncB type="linear" slope="0.7" intercept="0"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="1.5" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="logoClip">
      <circle cx="188" cy="209" r="120"/>
    </clipPath>
  </defs>

  <!-- BG -->
  <rect width="800" height="418" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
    <path d="M44 0L0 0 0 44" fill="none" stroke="#fff" stroke-width="0.12" opacity="0.06"/>
  </pattern>
  <rect width="800" height="418" fill="url(#grid)"/>

  <!-- Decorative arc top-right -->
  <circle cx="700" cy="-10" r="200" fill="none" stroke="#c5a059" stroke-width="0.7" opacity="0.15"/>
  <circle cx="700" cy="-10" r="150" fill="none" stroke="#c5a059" stroke-width="0.4" opacity="0.10"/>
  <circle cx="700" cy="-10" r="240" fill="#c5a059" opacity="0.04"/>

  <!-- Decorative arc bottom-left -->
  <circle cx="80"  cy="440" r="210" fill="none" stroke="#c5a059" stroke-width="0.7" opacity="0.12"/>
  <circle cx="80"  cy="440" r="260" fill="#c5a059" opacity="0.03"/>

  <!-- Gold top border -->
  <rect x="0" y="0" width="800" height="5" fill="url(#goldH)"/>
  <!-- Gold bottom border -->
  <rect x="0" y="413" width="800" height="5" fill="url(#goldH)"/>
  <!-- Left gold accent -->
  <rect x="54" y="30" width="2.5" height="358" fill="url(#goldV)" rx="1.5" opacity="0.5"/>

  <!-- Vertical divider (fades top/bottom) -->
  <rect x="358" y="0" width="1" height="418" fill="url(#dividerGrad)"/>

  <!-- ══ LEFT: LOGO ══ -->
  <!-- Halo behind logo -->
  <circle cx="188" cy="209" r="148" fill="url(#logoHalo)"/>
  <!-- Gold ring outer -->
  <circle cx="188" cy="209" r="130" fill="none" stroke="url(#goldH)" stroke-width="1.8" opacity="0.45"/>
  <!-- Gold ring inner -->
  <circle cx="188" cy="209" r="118" fill="none" stroke="#c5a059" stroke-width="0.8" opacity="0.25"/>
  <!-- Logo background circle — فاتح قليلاً يساعد على إظهار الشعار -->
  <circle cx="188" cy="209" r="114" fill="#ffffff" opacity="0.06"/>

  <!-- LOGO IMAGE — light version with golden filter -->
  <image
    href="https://semak.sa/images/logo-light.png"
    x="63" y="84"
    width="250" height="250"
    preserveAspectRatio="xMidYMid meet"
    filter="url(#logoFilter)"
    opacity="0.95"
  />

  <!-- ══ RIGHT: TEXT ══ -->

  <!-- "سماك العقارية" -->
  <text
    x="583" y="152"
    font-size="46" font-weight="900"
    fill="url(#goldH)"
    text-anchor="middle"
    direction="rtl"
    filter="url(#textShadow)"
  >سماك العقارية</text>

  <!-- Ornament line -->
  <line x1="400" y1="172" x2="766" y2="172" stroke="url(#goldH)" stroke-width="1.2" opacity="0.45"/>
  <circle cx="583" cy="172" r="3.5" fill="url(#goldH)"/>
  <circle cx="400" cy="172" r="2"   fill="#c5a059" opacity="0.5"/>
  <circle cx="766" cy="172" r="2"   fill="#c5a059" opacity="0.5"/>

  <!-- "خدمة الصيانة المنزلية" -->
  <text
    x="583" y="222"
    font-size="26" font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    direction="rtl"
    opacity="0.95"
  >خدمة الصيانة المنزلية</text>

  <!-- "نحن هنا لحل مشاكلك بسرعة واحترافية" -->
  <text
    x="583" y="258"
    font-size="14.5" font-weight="400"
    fill="#c5a059"
    text-anchor="middle"
    direction="rtl"
    opacity="0.80"
  >نحن هنا لحل مشاكلك بسرعة واحترافية</text>

  <!-- Full slogan pill -->
  <rect x="398" y="282" width="370" height="42" rx="21" fill="#c5a059" opacity="0.09"/>
  <rect x="398" y="282" width="370" height="42" rx="21" fill="none" stroke="url(#goldH)" stroke-width="1" opacity="0.4"/>

  <!-- Slogan line 1 -->
  <text
    x="583" y="301"
    font-size="13" font-weight="600"
    fill="#e8c97a"
    text-anchor="middle"
    direction="rtl"
    opacity="0.9"
  >سقف يعلو برؤيتك،</text>

  <!-- Slogan line 2 -->
  <text
    x="583" y="318"
    font-size="13" font-weight="600"
    fill="#e8c97a"
    text-anchor="middle"
    direction="rtl"
    opacity="0.9"
  >ومسكن يحكي قصتك ✨</text>

  <!-- Subtle gear decoration bottom-right -->
  <g transform="translate(740,380)" opacity="0.05" fill="#c5a059">
    <path d="M30-5L26-5C25-9 23-13 20-16L23-19C25-21 25-24 23-26L19-30C17-32 14-32 12-30L9-27C6-29 3-31 0-32L0-36C0-38-2-40-4-40L-9-40C-11-40-13-38-13-36L-13-32C-16-31-19-29-22-27L-25-30C-27-32-30-32-32-30L-36-26C-38-24-38-21-36-19L-33-16C-36-13-38-9-39-5L-43-5C-45-5-47-3-47-1L-47 4C-47 6-45 8-43 8L-39 8C-38 12-36 16-33 19L-36 22C-38 24-38 27-36 29L-32 33C-30 35-27 35-25 33L-22 30C-19 32-16 34-13 35L-13 39C-13 41-11 43-9 43L-4 43C-2 43 0 41 0 39L0 35C3 34 6 32 9 30L12 33C14 35 17 35 19 33L23 29C25 27 25 24 23 22L20 19C23 16 25 12 26 8L30 8C32 8 34 6 34 4L34-1C34-3 32-5 30-5ZM-7 14C-14 14-20 8-20 1C-20-6-14-12-7-12C0-12 6-6 6 1C6 8 0 14-7 14Z"/>
  </g>
</svg>
