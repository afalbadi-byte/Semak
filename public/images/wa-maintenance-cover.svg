<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 418" width="800" height="418">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap');
      text { font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif; }
    </style>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f"/>
      <stop offset="100%" style="stop-color:#132744"/>
    </linearGradient>

    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#c5a059"/>
      <stop offset="50%"  style="stop-color:#f0d080"/>
      <stop offset="100%" style="stop-color:#c5a059"/>
    </linearGradient>

    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#f5d878"/>
      <stop offset="100%" style="stop-color:#b08828"/>
    </linearGradient>

    <!-- Fade overlay: dark left → transparent right (blends photo into background) -->
    <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#07111f;stop-opacity:1"/>
      <stop offset="42%"  style="stop-color:#07111f;stop-opacity:0.92"/>
      <stop offset="62%"  style="stop-color:#07111f;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#07111f;stop-opacity:0.08"/>
    </linearGradient>

    <!-- Dark vignette on top & bottom of photo -->
    <linearGradient id="vigTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#07111f;stop-opacity:0.75"/>
      <stop offset="40%"  style="stop-color:#07111f;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="vigBot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="60%"  style="stop-color:#07111f;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#07111f;stop-opacity:0.8"/>
    </linearGradient>

    <!-- Badge gradient -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#f5d878"/>
      <stop offset="50%"  style="stop-color:#c5a035"/>
      <stop offset="100%" style="stop-color:#8a6510"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000" flood-opacity="0.55"/>
    </filter>

    <filter id="badgeShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Photo clip (right portion) -->
    <clipPath id="photoClip">
      <rect x="310" y="0" width="490" height="418"/>
    </clipPath>

    <!-- Full clip -->
    <clipPath id="clip"><rect width="800" height="418"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">

    <!-- ── BASE BACKGROUND ── -->
    <rect width="800" height="418" fill="url(#bgGrad)"/>

    <!-- ── REAL PHOTO — maintenance/handyman worker ── -->
    <image
      href="https://images.unsplash.com/photo-1621905251189-08b45d6a269e?w=520&h=418&fit=crop&crop=top"
      x="310" y="0"
      width="490" height="418"
      preserveAspectRatio="xMidYMid slice"
      clip-path="url(#photoClip)"
    />

    <!-- Vignette top on photo -->
    <rect x="310" y="0" width="490" height="418" fill="url(#vigTop)"/>
    <!-- Vignette bottom on photo -->
    <rect x="310" y="0" width="490" height="418" fill="url(#vigBot)"/>
    <!-- Left fade overlay (blends photo into dark background) -->
    <rect width="800" height="418" fill="url(#fadeLeft)"/>

    <!-- Subtle dot grid (left zone only) -->
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.85" fill="#c5a059" opacity="0.09"/>
    </pattern>
    <rect width="420" height="418" fill="url(#dots)"/>

    <!-- Gold top / bottom bars -->
    <rect x="0" y="0"   width="800" height="5" fill="url(#goldH)"/>
    <rect x="0" y="413" width="800" height="5" fill="url(#goldH)"/>

    <!-- Vertical gold accent line (separator) -->
    <line x1="410" y1="18" x2="410" y2="400"
      stroke="#c5a059" stroke-width="0.7"
      stroke-dasharray="5,7" opacity="0.2"/>

    <!-- ═══════════════════════════════
         COMPANY BADGE ON UNIFORM
         (chest position on the photo)
    ═══════════════════════════════ -->
    <g transform="translate(455, 215)" filter="url(#badgeShadow)">
      <!-- Outer badge frame -->
      <rect x="-38" y="-30" width="76" height="60" rx="8"
        fill="url(#badgeGrad)" opacity="0.97"/>
      <!-- Inner dark inset -->
      <rect x="-34" y="-26" width="68" height="52" rx="5"
        fill="#07111f" opacity="0.75"/>
      <!-- Logo inside badge -->
      <image
        href="https://semak.sa/images/logo-footer.png"
        x="-30" y="-22"
        width="60" height="44"
        preserveAspectRatio="xMidYMid meet"
      />
      <!-- Badge pin top -->
      <circle cx="0" cy="-33" r="4.5" fill="url(#goldV)"/>
      <circle cx="0" cy="-33" r="2"   fill="#f5d878"/>
    </g>

    <!-- ═══════════════════════════════
         LEFT TEXT CONTENT
    ═══════════════════════════════ -->

    <!-- Company logo (large) -->
    <image
      href="https://semak.sa/images/logo-footer.png"
      x="48" y="30"
      width="210" height="78"
      preserveAspectRatio="xMidYMid meet"
      filter="url(#shadow)"
    />

    <!-- Thin gold line under logo -->
    <line x1="48" y1="118" x2="350" y2="118"
      stroke="url(#goldH)" stroke-width="1" opacity="0.35"/>

    <!-- Main title -->
    <text x="48" y="162"
      font-size="30" font-weight="900"
      fill="#ffffff" text-anchor="start" direction="rtl"
      x="356"
      filter="url(#shadow)"
    >خدمة الصيانة المنزلية</text>
    <text
      x="200" y="162"
      font-size="30" font-weight="900"
      fill="#ffffff" text-anchor="middle" direction="rtl"
      filter="url(#shadow)"
    >خدمة الصيانة المنزلية</text>

    <!-- Subtitle -->
    <text x="200" y="196"
      font-size="14" font-weight="400"
      fill="#c5a059" text-anchor="middle" direction="rtl"
      opacity="0.9"
    >احترافية عالية · سرعة في الاستجابة</text>

    <!-- Divider dots -->
    <circle cx="140" cy="218" r="2.5" fill="#c5a059" opacity="0.5"/>
    <circle cx="160" cy="218" r="2.5" fill="#c5a059" opacity="0.5"/>
    <circle cx="180" cy="218" r="2.5" fill="#c5a059" opacity="0.5"/>
    <circle cx="200" cy="218" r="2.5" fill="#f0d080" opacity="0.8"/>
    <circle cx="220" cy="218" r="2.5" fill="#c5a059" opacity="0.5"/>
    <circle cx="240" cy="218" r="2.5" fill="#c5a059" opacity="0.5"/>
    <circle cx="260" cy="218" r="2.5" fill="#c5a059" opacity="0.5"/>

    <!-- Service badges -->
    <g text-anchor="middle" font-size="10.5" font-weight="700">
      <rect x="48"  y="232" width="78" height="24" rx="12" fill="#c5a059" opacity="0.14" stroke="#c5a059" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="87"  y="248" fill="#f0d080">⚡ كهرباء</text>

      <rect x="134" y="232" width="78" height="24" rx="12" fill="#c5a059" opacity="0.14" stroke="#c5a059" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="173" y="248" fill="#f0d080">🚰 سباكة</text>

      <rect x="220" y="232" width="78" height="24" rx="12" fill="#c5a059" opacity="0.14" stroke="#c5a059" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="259" y="248" fill="#f0d080">❄️ تكييف</text>

      <rect x="48"  y="263" width="78" height="24" rx="12" fill="#c5a059" opacity="0.14" stroke="#c5a059" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="87"  y="279" fill="#f0d080">🔧 أعطال</text>

      <rect x="134" y="263" width="78" height="24" rx="12" fill="#c5a059" opacity="0.14" stroke="#c5a059" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="173" y="279" fill="#f0d080">🎨 دهانات</text>

      <rect x="220" y="263" width="78" height="24" rx="12" fill="#c5a059" opacity="0.14" stroke="#c5a059" stroke-width="0.8" stroke-opacity="0.5"/>
      <text x="259" y="279" fill="#f0d080">🏠 عامة</text>
    </g>

    <!-- Separator line -->
    <line x1="48" y1="302" x2="370" y2="302"
      stroke="#c5a059" stroke-width="0.6" opacity="0.28"/>

    <!-- Slogan -->
    <text x="200" y="328"
      font-size="13.5" font-weight="700"
      fill="url(#goldH)" text-anchor="middle" direction="rtl"
      filter="url(#glow)" opacity="0.95"
    >سقف يعلو برؤيتك، ومسكن يحكي قصتك ✨</text>

    <!-- Website URL -->
    <text x="200" y="360"
      font-size="11.5" font-weight="400"
      fill="#c5a059" text-anchor="middle"
      opacity="0.45" letter-spacing="1"
    >www.semak.sa</text>

    <!-- Phone -->
    <text x="200" y="385"
      font-size="12" font-weight="600"
      fill="#ffffff" text-anchor="middle"
      opacity="0.55"
    >📞 920000000</text>

  </g>
</svg>
