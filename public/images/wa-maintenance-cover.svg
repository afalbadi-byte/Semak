<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 418" width="800" height="418">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap');
      text { font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif; }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1e3a6e"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#c5a059"/>
      <stop offset="50%"  style="stop-color:#f0d080"/>
      <stop offset="100%" style="stop-color:#c5a059"/>
    </linearGradient>
    <linearGradient id="diagGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#c5a059;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#a07830;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="stripeFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#c5a059;stop-opacity:0"/>
      <stop offset="30%"  style="stop-color:#c5a059;stop-opacity:0.4"/>
      <stop offset="70%"  style="stop-color:#c5a059;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#c5a059;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="svgClip"><rect width="800" height="418"/></clipPath>
  </defs>

  <g clip-path="url(#svgClip)">
    <!-- BG -->
    <rect width="800" height="418" fill="url(#bg)"/>

    <!-- Subtle dot grid -->
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.8" fill="#c5a059" opacity="0.12"/>
    </pattern>
    <rect width="800" height="418" fill="url(#dots)"/>

    <!-- Diagonal gold band — العنصر المميز -->
    <polygon points="-30,320 820,80 820,140 -30,380" fill="url(#diagGold)" opacity="0.12"/>
    <polygon points="-30,335 820,95 820,102 -30,342" fill="url(#diagGold)" opacity="0.35"/>

    <!-- Large circle glow — top right -->
    <circle cx="750" cy="0" r="280" fill="#1a365d" opacity="0.5"/>
    <circle cx="750" cy="0" r="200" fill="none" stroke="#c5a059" stroke-width="1" opacity="0.12"/>
    <circle cx="750" cy="0" r="140" fill="none" stroke="#c5a059" stroke-width="0.5" opacity="0.10"/>

    <!-- Building silhouette — subtle background -->
    <g opacity="0.04" fill="#c5a059" transform="translate(520, 418) scale(1,-1)">
      <!-- Building 1 -->
      <rect x="0"   y="0" width="60" height="200"/>
      <rect x="10"  y="200" width="10" height="30"/>
      <rect x="40"  y="200" width="10" height="30"/>
      <!-- Windows -->
      <rect x="8"  y="20" width="12" height="14" fill="#1a365d" opacity="5"/>
      <rect x="8"  y="45" width="12" height="14" fill="#1a365d" opacity="5"/>
      <rect x="8"  y="70" width="12" height="14" fill="#1a365d" opacity="5"/>
      <rect x="38" y="20" width="12" height="14" fill="#1a365d" opacity="5"/>
      <rect x="38" y="45" width="12" height="14" fill="#1a365d" opacity="5"/>
      <!-- Building 2 -->
      <rect x="70"  y="0" width="45" height="150"/>
      <!-- Building 3 -->
      <rect x="125" y="0" width="55" height="240"/>
      <rect x="145" y="240" width="15" height="40"/>
    </g>

    <!-- Gold top bar -->
    <rect x="0" y="0"   width="800" height="5" fill="url(#goldH)"/>
    <!-- Gold bottom bar -->
    <rect x="0" y="413" width="800" height="5" fill="url(#goldH)"/>

    <!-- Left accent line -->
    <rect x="52" y="30" width="2" height="358" fill="url(#stripeFade)" rx="1"/>
    <!-- Right accent line -->
    <rect x="746" y="30" width="2" height="358" fill="url(#stripeFade)" rx="1"/>

    <!-- ══ CONTENT ══ -->

    <!-- Logo -->
    <image
      href="https://semak.sa/images/logo-footer.png"
      x="270" y="36"
      width="260" height="118"
      preserveAspectRatio="xMidYMid meet"
      filter="url(#softShadow)"
    />

    <!-- Thin gold line under logo -->
    <line x1="240" y1="170" x2="560" y2="170" stroke="url(#goldH)" stroke-width="1" opacity="0.6"/>
    <!-- Diamond centre -->
    <polygon points="400,163 407,170 400,177 393,170" fill="url(#goldH)" filter="url(#glow)"/>

    <!-- Main title -->
    <text x="400" y="228"
      font-size="33" font-weight="900"
      fill="#ffffff" text-anchor="middle" direction="rtl"
      filter="url(#softShadow)" letter-spacing="1"
    >خـدمـة الـصـيـانـة الـمـنـزلـيـة</text>

    <!-- Subtitle -->
    <text x="400" y="272"
      font-size="16" font-weight="400"
      fill="#c5a059" text-anchor="middle" direction="rtl"
      opacity="0.9"
    >نحن هنا لحل مشاكلك بسرعة واحترافية</text>

    <!-- 3 icon features -->
    <g direction="rtl" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff" opacity="0.75">
      <text x="200" y="315">⚡ كهرباء</text>
      <text x="400" y="315">🚰 سباكة</text>
      <text x="600" y="315">❄️ تكييف</text>
    </g>
    <line x1="120" y1="322" x2="680" y2="322" stroke="#c5a059" stroke-width="0.5" opacity="0.3"/>

    <!-- Slogan -->
    <text x="400" y="370"
      font-size="15" font-weight="600"
      fill="url(#goldH)" text-anchor="middle" direction="rtl"
      opacity="0.9" filter="url(#glow)"
    >سقف يعلو برؤيتك، ومسكن يحكي قصتك ✨</text>
  </g>
</svg>
