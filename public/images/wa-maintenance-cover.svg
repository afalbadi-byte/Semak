<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 418" width="800" height="418">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap');
      text { font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif; }
    </style>

    <!-- BG gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f"/>
      <stop offset="100%" style="stop-color:#132744"/>
    </linearGradient>

    <!-- Gold horizontal -->
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#c5a059"/>
      <stop offset="50%"  style="stop-color:#f0d080"/>
      <stop offset="100%" style="stop-color:#c5a059"/>
    </linearGradient>

    <!-- Gold radial glow -->
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#f0d080;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#c5a059;stop-opacity:0"/>
    </radialGradient>

    <!-- Tool fill gradient -->
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#f0d080"/>
      <stop offset="100%" style="stop-color:#a07830"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Strong glow for tools -->
    <filter id="toolGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Clip -->
    <clipPath id="clip"><rect width="800" height="418"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">

    <!-- ── BACKGROUND ── -->
    <rect width="800" height="418" fill="url(#bg)"/>

    <!-- Subtle circuit-board grid lines -->
    <g stroke="#c5a059" stroke-width="0.4" opacity="0.06">
      <line x1="0"   y1="60"  x2="800" y2="60"/>
      <line x1="0"   y1="120" x2="800" y2="120"/>
      <line x1="0"   y1="200" x2="800" y2="200"/>
      <line x1="0"   y1="300" x2="800" y2="300"/>
      <line x1="0"   y1="360" x2="800" y2="360"/>
      <line x1="80"  y1="0"   x2="80"  y2="418"/>
      <line x1="200" y1="0"   x2="200" y2="418"/>
      <line x1="400" y1="0"   x2="400" y2="418"/>
      <line x1="600" y1="0"   x2="600" y2="418"/>
      <line x1="720" y1="0"   x2="720" y2="418"/>
    </g>

    <!-- Circuit dots at intersections -->
    <g fill="#c5a059" opacity="0.10">
      <circle cx="80"  cy="60"  r="2.5"/>
      <circle cx="200" cy="60"  r="2.5"/>
      <circle cx="400" cy="60"  r="2.5"/>
      <circle cx="600" cy="60"  r="2.5"/>
      <circle cx="720" cy="60"  r="2.5"/>
      <circle cx="80"  cy="120" r="2.5"/>
      <circle cx="200" cy="120" r="2.5"/>
      <circle cx="400" cy="120" r="2.5"/>
      <circle cx="600" cy="120" r="2.5"/>
      <circle cx="720" cy="120" r="2.5"/>
      <circle cx="80"  cy="200" r="2.5"/>
      <circle cx="200" cy="200" r="2.5"/>
      <circle cx="600" cy="200" r="2.5"/>
      <circle cx="720" cy="200" r="2.5"/>
      <circle cx="80"  cy="300" r="2.5"/>
      <circle cx="200" cy="300" r="2.5"/>
      <circle cx="400" cy="300" r="2.5"/>
      <circle cx="600" cy="300" r="2.5"/>
      <circle cx="720" cy="300" r="2.5"/>
    </g>

    <!-- Gold glow circle — centre background -->
    <ellipse cx="400" cy="209" rx="220" ry="160" fill="url(#goldGlow)"/>

    <!-- ── GOLD BARS ── -->
    <rect x="0" y="0"   width="800" height="5" fill="url(#goldH)"/>
    <rect x="0" y="413" width="800" height="5" fill="url(#goldH)"/>

    <!-- ── BIG BACKGROUND GEAR — left, very subtle ── -->
    <g transform="translate(68,209)" opacity="0.055" fill="#c5a059">
      <path d="M0,-90 L10,-72 L28,-82 L36,-64 L55,-65 L55,-45 L73,-36 L63,-19
               L78,0 L63,19 L73,36 L55,45 L55,65 L36,64 L28,82 L10,72
               L0,90 L-10,72 L-28,82 L-36,64 L-55,65 L-55,45 L-73,36 L-63,19
               L-78,0 L-63,-19 L-73,-36 L-55,-45 L-55,-65 L-36,-64 L-28,-82 L-10,-72 Z"/>
      <circle cx="0" cy="0" r="45" fill="#07111f"/>
      <circle cx="0" cy="0" r="18" fill="#c5a059"/>
    </g>

    <!-- ── BIG BACKGROUND GEAR — right, very subtle ── -->
    <g transform="translate(732,209)" opacity="0.055" fill="#c5a059">
      <path d="M0,-80 L9,-64 L25,-73 L32,-57 L49,-58 L49,-40 L65,-32 L56,-17
               L69,0 L56,17 L65,32 L49,40 L49,58 L32,57 L25,73 L9,64
               L0,80 L-9,64 L-25,73 L-32,57 L-49,58 L-49,40 L-65,32 L-56,17
               L-69,0 L-56,-17 L-65,-32 L-49,-40 L-49,-58 L-32,-57 L-25,-73 L-9,-64 Z"/>
      <circle cx="0" cy="0" r="40" fill="#07111f"/>
      <circle cx="0" cy="0" r="16" fill="#c5a059"/>
    </g>

    <!-- ══════════════════════════════════
         LEFT SECTION — WRENCH (large)
    ══════════════════════════════════ -->
    <g transform="translate(118, 209) rotate(-35)" filter="url(#toolGlow)" opacity="0.22">
      <!-- Wrench handle -->
      <rect x="-7" y="-10" width="14" height="100" rx="7" fill="url(#toolGrad)"/>
      <!-- Wrench head ring -->
      <circle cx="0" cy="-28" r="28" fill="url(#toolGrad)"/>
      <circle cx="0" cy="-28" r="16" fill="#07111f"/>
      <!-- Wrench jaw notch -->
      <rect x="-28" y="-42" width="14" height="24" rx="3" fill="#07111f"/>
    </g>

    <!-- ══════════════════════════════════
         RIGHT SECTION — SCREWDRIVER
    ══════════════════════════════════ -->
    <g transform="translate(682, 200) rotate(40)" filter="url(#toolGlow)" opacity="0.22">
      <!-- Handle -->
      <rect x="-11" y="-55" width="22" height="55" rx="8" fill="url(#toolGrad)"/>
      <!-- Handle grip lines -->
      <rect x="-11" y="-45" width="22" height="4" rx="2" fill="#07111f" opacity="0.4"/>
      <rect x="-11" y="-33" width="22" height="4" rx="2" fill="#07111f" opacity="0.4"/>
      <rect x="-11" y="-21" width="22" height="4" rx="2" fill="#07111f" opacity="0.4"/>
      <!-- Shaft -->
      <rect x="-4" y="0"   width="8"  height="80" rx="3" fill="url(#toolGrad)"/>
      <!-- Flat tip -->
      <rect x="-7" y="78"  width="14" height="6"  rx="1" fill="url(#toolGrad)"/>
    </g>

    <!-- ══════════════════════════════════
         CENTRE TOP — HOUSE ICON
    ══════════════════════════════════ -->
    <g transform="translate(400, 58)" filter="url(#glow)">
      <!-- Roof -->
      <polygon points="0,-28 48,12 -48,12" fill="url(#goldH)" opacity="0.9"/>
      <!-- Roof line edge -->
      <polygon points="0,-28 48,12 -48,12" fill="none" stroke="#f0d080" stroke-width="1" opacity="0.5"/>
      <!-- Chimney -->
      <rect x="18" y="-22" width="10" height="18" rx="2" fill="url(#goldH)" opacity="0.8"/>
      <!-- Walls -->
      <rect x="-38" y="12" width="76" height="44" rx="3" fill="url(#toolGrad)" opacity="0.7"/>
      <!-- Door -->
      <rect x="-9" y="30" width="18" height="26" rx="3" fill="#07111f" opacity="0.8"/>
      <!-- Windows -->
      <rect x="-32" y="18" width="14" height="12" rx="2" fill="#f0d080" opacity="0.6"/>
      <rect x="18"  y="18" width="14" height="12" rx="2" fill="#f0d080" opacity="0.6"/>
      <!-- Wrench mini overlay on house -->
      <g transform="translate(0, 30) rotate(-30)" opacity="0.9">
        <rect x="-2.5" y="-4" width="5" height="22" rx="2.5" fill="#f0d080"/>
        <circle cx="0" cy="-9" r="9" fill="#f0d080"/>
        <circle cx="0" cy="-9" r="5" fill="#132744"/>
        <rect x="-9" y="-15" width="5" height="9" rx="1.5" fill="#132744"/>
      </g>
    </g>

    <!-- ══════════════════════════════════
         LOGO
    ══════════════════════════════════ -->
    <image
      href="https://semak.sa/images/logo-footer.png"
      x="270" y="115"
      width="260" height="100"
      preserveAspectRatio="xMidYMid meet"
      filter="url(#shadow)"
    />

    <!-- Gold divider line + diamond -->
    <line x1="200" y1="228" x2="600" y2="228" stroke="url(#goldH)" stroke-width="1" opacity="0.5"/>
    <polygon points="400,221 408,228 400,235 392,228" fill="url(#goldH)" filter="url(#glow)"/>

    <!-- ══ MAIN TITLE ══ -->
    <text x="400" y="270"
      font-size="32" font-weight="900"
      fill="#ffffff" text-anchor="middle" direction="rtl"
      filter="url(#shadow)" letter-spacing="0.5"
    >خـدمـة الـصـيـانـة الـمـنـزلـيـة</text>

    <!-- SUBTITLE -->
    <text x="400" y="305"
      font-size="15" font-weight="400"
      fill="#c5a059" text-anchor="middle" direction="rtl"
      opacity="0.85"
    >نحن هنا لحل مشاكلك بسرعة واحترافية عالية</text>

    <!-- ══ SERVICE ICONS ROW ══ -->
    <g text-anchor="middle" font-size="11" font-weight="700" direction="rtl">
      <!-- Electricity -->
      <rect x="126" y="322" width="96" height="30" rx="15" fill="#c5a059" opacity="0.12" stroke="#c5a059" stroke-width="0.8" stroke-opacity="0.4"/>
      <text x="174" y="341" fill="#f0d080">⚡ كهرباء</text>
      <!-- Plumbing -->
      <rect x="252" y="322" width="96" height="30" rx="15" fill="#c5a059" opacity="0.12" stroke="#c5a059" stroke-width="0.8" stroke-opacity="0.4"/>
      <text x="300" y="341" fill="#f0d080">🚰 سباكة</text>
      <!-- AC -->
      <rect x="378" y="322" width="96" height="30" rx="15" fill="#c5a059" opacity="0.12" stroke="#c5a059" stroke-width="0.8" stroke-opacity="0.4"/>
      <text x="426" y="341" fill="#f0d080">❄️ تكييف</text>
      <!-- Painting -->
      <rect x="504" y="322" width="96" height="30" rx="15" fill="#c5a059" opacity="0.12" stroke="#c5a059" stroke-width="0.8" stroke-opacity="0.4"/>
      <text x="552" y="341" fill="#f0d080">🎨 دهانات</text>
    </g>

    <!-- ══ SLOGAN ══ -->
    <text x="400" y="392"
      font-size="14" font-weight="600"
      fill="url(#goldH)" text-anchor="middle" direction="rtl"
      opacity="0.85" filter="url(#glow)"
    >سقف يعلو برؤيتك، ومسكن يحكي قصتك ✨</text>

    <!-- Left/right accent lines -->
    <rect x="48"  y="20" width="2" height="378" fill="url(#goldH)" opacity="0.08" rx="1"/>
    <rect x="750" y="20" width="2" height="378" fill="url(#goldH)" opacity="0.08" rx="1"/>

  </g>
</svg>
