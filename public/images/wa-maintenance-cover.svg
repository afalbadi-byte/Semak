<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 418" width="800" height="418">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap');
      text { font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  style="stop-color:#0d1f3c"/>
      <stop offset="55%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#1c3461"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#b8922a"/>
      <stop offset="50%"  style="stop-color:#e8c97a"/>
      <stop offset="100%" style="stop-color:#c5a059"/>
    </linearGradient>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="418" fill="url(#bgGrad)"/>

  <!-- Grid -->
  <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
    <path d="M44 0L0 0 0 44" fill="none" stroke="#fff" stroke-width="0.12" opacity="0.06"/>
  </pattern>
  <rect width="800" height="418" fill="url(#grid)"/>

  <!-- Decorative circles top-right -->
  <circle cx="720" cy="-20" r="200" fill="none" stroke="#c5a059" stroke-width="0.7" opacity="0.15"/>
  <circle cx="720" cy="-20" r="150" fill="none" stroke="#c5a059" stroke-width="0.4" opacity="0.10"/>
  <circle cx="720" cy="-20" r="250" fill="#c5a059" opacity="0.04"/>

  <!-- Decorative circles bottom-left -->
  <circle cx="80"  cy="450" r="210" fill="none" stroke="#c5a059" stroke-width="0.7" opacity="0.10"/>
  <circle cx="80"  cy="450" r="280" fill="#c5a059" opacity="0.03"/>

  <!-- Gold top border -->
  <rect x="0" y="0"   width="800" height="5" fill="url(#goldH)"/>
  <!-- Gold bottom border -->
  <rect x="0" y="413" width="800" height="5" fill="url(#goldH)"/>

  <!-- Logo — centered top -->
  <image
    href="https://semak.sa/images/logo-footer.png"
    x="280" y="48"
    width="240" height="110"
    preserveAspectRatio="xMidYMid meet"
    filter="url(#textShadow)"
  />

  <!-- Ornament line -->
  <line x1="180" y1="178" x2="620" y2="178" stroke="url(#goldH)" stroke-width="1.2" opacity="0.5"/>
  <circle cx="400" cy="178" r="4" fill="url(#goldH)"/>
  <circle cx="180" cy="178" r="2.5" fill="#c5a059" opacity="0.5"/>
  <circle cx="620" cy="178" r="2.5" fill="#c5a059" opacity="0.5"/>

  <!-- "خدمة الصيانة المنزلية" -->
  <text
    x="400" y="234"
    font-size="34" font-weight="700"
    fill="#ffffff"
    text-anchor="middle"
    direction="rtl"
    opacity="0.95"
  >خدمة الصيانة المنزلية</text>

  <!-- "نحن هنا لحل مشاكلك بسرعة واحترافية" -->
  <text
    x="400" y="278"
    font-size="17" font-weight="400"
    fill="#c5a059"
    text-anchor="middle"
    direction="rtl"
    opacity="0.85"
  >نحن هنا لحل مشاكلك بسرعة واحترافية</text>

  <!-- السلوقان كامل سطر واحد -->
  <text
    x="400" y="338"
    font-size="16" font-weight="600"
    fill="#e8c97a"
    text-anchor="middle"
    direction="rtl"
    opacity="0.85"
  >سقف يعلو برؤيتك، ومسكن يحكي قصتك ✨</text>

</svg>
