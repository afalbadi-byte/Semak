<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 418" width="800" height="418" font-family="'Segoe UI', Tahoma, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f2340;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c5a059;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c97a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c97a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5a059;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c5a059;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#c5a059;stop-opacity:0.03" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="logoCircle">
      <circle cx="200" cy="209" r="105"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="418" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.07"/>
  </pattern>
  <rect width="800" height="418" fill="url(#grid)"/>

  <!-- Decorative background circles (top right) -->
  <circle cx="690" cy="-20" r="190" fill="url(#circleGrad)"/>
  <circle cx="710" cy="10"  r="130" fill="none" stroke="#c5a059" stroke-width="0.6" opacity="0.18"/>
  <circle cx="670" cy="-10" r="80"  fill="none" stroke="#c5a059" stroke-width="0.4" opacity="0.12"/>

  <!-- Decorative background circles (bottom left) -->
  <circle cx="110" cy="460" r="210" fill="url(#circleGrad)"/>
  <circle cx="90"  cy="470" r="140" fill="none" stroke="#c5a059" stroke-width="0.6" opacity="0.18"/>

  <!-- Gold top bar -->
  <rect x="0" y="0" width="800" height="4" fill="url(#goldGrad)"/>
  <!-- Gold bottom bar -->
  <rect x="0" y="414" width="800" height="4" fill="url(#goldGrad)"/>
  <!-- Left gold vertical bar -->
  <rect x="58" y="36" width="3" height="346" fill="url(#goldGradV)" rx="2" opacity="0.55"/>

  <!-- Divider between logo and text -->
  <line x1="350" y1="60" x2="350" y2="358" stroke="#c5a059" stroke-width="0.8" opacity="0.25"/>

  <!-- ═══ LOGO SECTION (left) ═══ -->
  <!-- Outer glow ring -->
  <circle cx="200" cy="209" r="118" fill="#c5a059" opacity="0.06" filter="url(#logoGlow)"/>
  <!-- Gold ring -->
  <circle cx="200" cy="209" r="112" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5"/>
  <!-- Inner subtle ring -->
  <circle cx="200" cy="209" r="105" fill="#c5a059" opacity="0.05"/>
  <!-- Second ring -->
  <circle cx="200" cy="209" r="95" fill="none" stroke="#c5a059" stroke-width="0.8" opacity="0.2"/>

  <!-- Logo image — centered in circle -->
  <image
    href="https://semak.sa/images/logo-main.png"
    x="95" y="104"
    width="210" height="210"
    preserveAspectRatio="xMidYMid meet"
    filter="url(#logoGlow)"
  />

  <!-- ═══ TEXT SECTION (right) ═══ -->

  <!-- Company name -->
  <text x="565" y="148" font-size="40" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" direction="rtl" filter="url(#shadow)">سماك العقارية</text>

  <!-- Gold divider with dots -->
  <line x1="395" y1="168" x2="735" y2="168" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.5"/>
  <circle cx="565" cy="168" r="3.5" fill="#c5a059"/>
  <circle cx="395" cy="168" r="2" fill="#c5a059" opacity="0.5"/>
  <circle cx="735" cy="168" r="2" fill="#c5a059" opacity="0.5"/>

  <!-- Main service title -->
  <text x="565" y="220" font-size="27" font-weight="bold" fill="#ffffff" text-anchor="middle" direction="rtl" opacity="0.95">خدمة الصيانة المنزلية</text>

  <!-- Subtitle -->
  <text x="565" y="257" font-size="15" fill="#c5a059" text-anchor="middle" direction="rtl" opacity="0.85" font-weight="500">نحن هنا لحل مشاكلك بسرعة واحترافية</text>

  <!-- Tagline pill -->
  <rect x="415" y="283" width="300" height="38" rx="19" fill="#c5a059" opacity="0.1"/>
  <rect x="415" y="283" width="300" height="38" rx="19" fill="none" stroke="#c5a059" stroke-width="1" opacity="0.35"/>
  <text x="565" y="308" font-size="14" fill="#e8c97a" text-anchor="middle" direction="rtl" font-weight="600">سقف يعلو برؤيتك ✨</text>

  <!-- Gear decorative (subtle background right) -->
  <g transform="translate(710, 340)" opacity="0.06" fill="#c5a059">
    <path d="M 40 -7 L 35 -7 C 33 -12 31 -17 27 -22 L 31 -26 C 33 -28 33 -31 31 -33 L 26 -38 C 24 -40 21 -40 19 -38 L 15 -34 C 10 -37 5 -40 0 -41 L 0 -47 C 0 -49 -3 -52 -5 -52 L -12 -52 C -14 -52 -17 -49 -17 -47 L -17 -41 C -22 -40 -27 -37 -32 -34 L -36 -38 C -38 -40 -41 -40 -43 -38 L -48 -33 C -50 -31 -50 -28 -48 -26 L -44 -22 C -47 -17 -49 -12 -51 -7 L -57 -7 C -59 -7 -62 -4 -62 -2 L -62 5 C -62 7 -59 10 -57 10 L -51 10 C -49 15 -47 20 -44 25 L -48 29 C -50 31 -50 34 -48 36 L -43 41 C -41 43 -38 43 -36 41 L -32 37 C -27 40 -22 43 -17 44 L -17 50 C -17 52 -14 55 -12 55 L -5 55 C -3 55 0 52 0 50 L 0 44 C 5 43 10 40 15 37 L 19 41 C 21 43 24 43 26 41 L 31 36 C 33 34 33 31 31 29 L 27 25 C 31 20 33 15 35 10 L 40 10 C 42 10 45 7 45 5 L 45 -2 C 45 -4 42 -7 40 -7 Z M -9 20 C -21 20 -31 10 -31 -2 C -31 -14 -21 -24 -9 -24 C 3 -24 13 -14 13 -2 C 13 10 3 20 -9 20 Z"/>
  </g>
</svg>
