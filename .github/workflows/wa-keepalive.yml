name: WhatsApp Keep-Alive (Admin)

on:
  schedule:
    - cron: '0 */23 * * *'   # كل 23 ساعة
  workflow_dispatch:          # تشغيل يدوي عند الحاجة

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive message to admin
        run: |
          curl -s -X POST "https://api.mottasl.ai/v1/message/send" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WA_TOKEN }}" \
            -d '{
              "to": "${{ secrets.VITE_WA_ADMIN_PHONE }}",
              "type": "text",
              "text": { "body": "تجديد" }
            }'