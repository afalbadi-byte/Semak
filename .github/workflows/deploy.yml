name: Deploy React App to Hostinger

on:
  push:
    branches:
      - main # يتم تفعيل هذا السكربت عند التعديل على الفرع الرئيسي

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        # 🔴 التعديل الأول: لحل مشكلة الخطأ الأحمر في تثبيت المكتبات (الصورة الثانية)
        run: npm install --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # 🔴 التعديل الثاني: إضافة البورت لتجنب مشكلة الـ Timeout (الصورة الأولى)
          port: 21 
          local-dir: ./dist/ 
          # 🔴 التعديل الثالث: المسار الصحيح لهوستينجر عشان يشتغل الموقع للزوار
          server-dir: ./
          
