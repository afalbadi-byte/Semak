name: Deploy React App to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21 
          local-dir: ./dist/ 
          server-dir: ./public_html/ # 👈 تأكد أن هذا هو المجلد الرئيسي في هوستينجر
          method: ftp # 👈 تحديد البروتوكول صراحة
          timeout: 900000 # 👈 زيادة وقت الانتظار جداً (15 دقيقة) لمنع الـ Timeout
          passive: true # 👈 ضروري جداً لاستضافات الفتح المشترك مثل هوستينجر
          dangerous-clean-slate: false # 👈 عشان ما يحذف ملفاتك المهمة مثل api.php