name: Deploy React App to Hostinger

on:
  push:
    branches:
      - main # تأكد إن هذا اسم الفرع حقك (أحياناً يكون master)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🏗️ Build Project
        run: npm run build

      - name: 🚀 Deploy to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }} # 👈 تأكد في الإعدادات أن هذا هو عنوان الـ IP وليس الدومين
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21 # 👈 تحديد المنفذ بشكل صريح
          protocol: ftp # 👈 إجبار الأداة على استخدام FTP العادي لتجاوز تعليق التشفير في Hostinger
          local-dir: dist/
          server-dir: ./ # 👈 ملاحظة: إذا كان حساب الـ FTP يفتح على الجذر الرئيسي للاستضافة وليس داخل الموقع، قد تحتاج لتغييرها إلى public_html/
          dangerous-clean-slate: false # هذي تمنعه يحذف ملف api.php حقك